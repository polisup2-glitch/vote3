<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>익명 투표 & 방명록</title>
  <style>
    :root{
      --bg:#f6f1ea;
      --card:#ffffff;
      --text:#1f1a17;
      --muted:#6d645b;
      --line:rgba(31,26,23,0.12);
      --accent:#8b5c46;
      --accent-dark:#6f4736;
      --danger:#c14d4d;
      --shadow:0 16px 40px rgba(31,26,23,0.08);
      --radius-xl:24px;
      --radius-lg:18px;
      --radius-md:12px;
      --max:1200px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
      background:linear-gradient(180deg,#f8f4ee 0%,#f3ede5 100%);
      color:var(--text);
      line-height:1.55;
    }

    .container{
      width:min(calc(100% - 32px), var(--max));
      margin:0 auto;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(246,241,234,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      font-size:20px;
      font-weight:800;
      letter-spacing:-0.04em;
    }

    .top-actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .badge{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:rgba(31,26,23,0.06);
      color:var(--muted);
    }

    .badge.admin{
      background:rgba(139,92,70,0.14);
      color:var(--accent-dark);
    }

    .hero{
      padding:36px 0 20px;
    }

    .hero-card,.card{
      background:rgba(255,255,255,0.9);
      border:1px solid rgba(255,255,255,0.7);
      box-shadow:var(--shadow);
    }

    .hero-card{
      border-radius:32px;
      padding:30px;
    }

    .eyebrow{
      display:inline-block;
      margin-bottom:12px;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(139,92,70,0.10);
      color:var(--accent-dark);
      font-size:12px;
      font-weight:800;
    }

    h1{
      margin:0 0 10px;
      font-size:clamp(32px, 6vw, 58px);
      line-height:1;
      letter-spacing:-0.06em;
    }

    .hero-card p{
      margin:0;
      color:var(--muted);
      font-size:16px;
      max-width:760px;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:20px;
      padding:18px 0 40px;
    }

    .card{
      border-radius:var(--radius-xl);
      padding:24px;
    }

    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:end;
      gap:12px;
      margin-bottom:18px;
    }

    .section-head h2{
      margin:0;
      font-size:28px;
      letter-spacing:-0.04em;
    }

    .section-head p{
      margin:0;
      color:var(--muted);
      font-size:14px;
      text-align:right;
    }

    .btn{
      border:0;
      border-radius:999px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:700;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
      color:#fff;
    }

    .btn-secondary{
      background:#fff;
      border:1px solid var(--line);
      color:var(--text);
    }

    .btn-danger{
      background:var(--danger);
      color:#fff;
    }

    .input,.textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:var(--radius-md);
      padding:14px 15px;
      background:#fff;
      outline:none;
      font:inherit;
      color:var(--text);
    }

    .textarea{
      min-height:140px;
      resize:vertical;
    }

    .input:focus,.textarea:focus{
      border-color:rgba(139,92,70,0.5);
      box-shadow:0 0 0 4px rgba(139,92,70,0.08);
    }

    .form-grid{
      display:grid;
      gap:12px;
    }

    .helper{
      margin:10px 0 0;
      color:var(--muted);
      font-size:13px;
    }

    .vote-list,.guestbook-list{
      display:grid;
      gap:12px;
      margin-top:18px;
    }

    .vote-item,.guestbook-item{
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:rgba(255,255,255,0.72);
    }

    .vote-top,.guestbook-meta{
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .vote-title,.guestbook-name{
      font-weight:800;
      letter-spacing:-0.03em;
    }

    .vote-count,.guestbook-date{
      color:var(--muted);
      font-size:12px;
    }

    .progress-track{
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(31,26,23,0.08);
      margin:12px 0;
    }

    .progress-bar{
      height:100%;
      width:0;
      background:linear-gradient(135deg,var(--accent),var(--accent-dark));
    }

    .vote-bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .inline-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .mini-btn{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
    }

    .danger-text{
      color:var(--danger);
    }

    .guestbook-message{
      margin:8px 0 0;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .admin-panel{
      display:none;
      margin-top:16px;
      padding-top:16px;
      border-top:1px dashed var(--line);
    }

    .admin-panel.active{
      display:block;
    }

    .admin-grid{
      display:grid;
      grid-template-columns:1fr auto;
      gap:12px;
    }

    .empty{
      padding:18px;
      border:1px dashed var(--line);
      border-radius:16px;
      text-align:center;
      color:var(--muted);
      background:rgba(255,255,255,0.55);
    }

    .modal-backdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.45);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:100;
    }

    .modal-backdrop.active{
      display:flex;
    }

    .modal{
      width:min(100%, 420px);
      background:#fff;
      border-radius:24px;
      padding:24px;
      box-shadow:0 30px 80px rgba(0,0,0,0.2);
    }

    .modal h3{
      margin:0 0 8px;
      font-size:24px;
      letter-spacing:-0.04em;
    }

    .modal p{
      margin:0 0 14px;
      color:var(--muted);
      font-size:14px;
    }

    .error{
      min-height:18px;
      margin-top:8px;
      color:var(--danger);
      font-size:13px;
    }

    @media (max-width: 920px){
      .grid,.admin-grid{
        grid-template-columns:1fr;
      }
      .section-head{
        flex-direction:column;
        align-items:flex-start;
      }
      .section-head p{
        text-align:left;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">익명 투표 & 방명록</div>
      <div class="top-actions">
        <span id="adminStatus" class="badge">일반 방문자 모드</span>
        <button id="openAdminBtn" class="btn btn-secondary" type="button">관리자 로그인</button>
        <button id="logoutAdminBtn" class="btn btn-secondary" type="button" style="display:none;">관리자 로그아웃</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-card">
          <span class="eyebrow">ANONYMOUS VOTE & GUESTBOOK</span>
          <h1>투표하고, 방명록을 남기세요.</h1>
          <p>처음 들어오면 일반 방문자 모드로 시작합니다. 관리자는 로그인 후에만 항목 수정과 삭제가 가능합니다.</p>
        </div>
      </div>
    </section>

    <section>
      <div class="container grid">
        <div class="card">
          <div class="section-head">
            <div><h2>익명 투표</h2></div>
            <p>일반 방문자는 투표만 가능합니다.</p>
          </div>

          <div id="voteList" class="vote-list"></div>
          <p class="helper">브라우저 저장 기준으로 한 번 투표하면 다시 막힙니다.</p>

          <div id="voteAdminPanel" class="admin-panel">
            <h3 style="margin:0 0 12px; font-size:18px;">관리자 투표 설정</h3>
            <div class="admin-grid">
              <input id="newVoteTitle" class="input" type="text" placeholder="새 투표 항목 이름" />
              <button id="addVoteBtn" class="btn btn-primary" type="button">투표 항목 추가</button>
            </div>
            <div class="inline-actions">
              <button id="resetVotesBtn" class="mini-btn danger-text" type="button">전체 투표 수 초기화</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <div><h2>방명록</h2></div>
            <p>누구나 메시지를 남길 수 있습니다.</p>
          </div>

          <div class="form-grid">
            <input id="guestName" class="input" type="text" maxlength="20" placeholder="이름 또는 익명" />
            <textarea id="guestMessage" class="textarea" maxlength="500" placeholder="방명록 내용을 입력해주세요."></textarea>
            <button id="submitGuestbookBtn" class="btn btn-primary" type="button">전송</button>
          </div>
          <p class="helper">이름을 비워두면 자동으로 ‘익명’으로 저장됩니다.</p>

          <div id="guestbookAdminActions" class="inline-actions" style="display:none; margin-top:16px;">
            <button id="clearGuestbookBtn" class="mini-btn danger-text" type="button">방명록 전체 삭제</button>
          </div>

          <div id="guestbookList" class="guestbook-list"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="adminModal" class="modal-backdrop">
    <div class="modal">
      <h3>관리자 로그인</h3>
      <p>비밀번호를 입력하면 관리자 수정 모드가 열립니다.</p>
      <input id="adminPasswordInput" class="input" type="password" placeholder="관리자 비밀번호" />
      <div id="adminError" class="error"></div>
      <div class="inline-actions">
        <button id="adminLoginBtn" class="btn btn-primary" type="button">로그인</button>
        <button id="closeAdminModalBtn" class="btn btn-secondary" type="button">닫기</button>
      </div>
    </div>
  </div>

  <!-- Firebase SDK (Realtime Database) -->
  <!--
    1) Firebase 프로젝트 생성
      - https://console.firebase.google.com/
    2) Realtime Database 활성화
      - Build 탭 -> Realtime Database -> Create database
    3) 웹 앱 등록 후 Firebase 설정값 복사
      - Project settings -> General -> Your apps -> Firebase SDK snippet
    4) 아래 `firebaseConfig`의 값을 본인 프로젝트 값으로 교체
    5) (중요) Database Rules 설정
      - 지금 코드는 데모 목적이라 읽기/쓰기 권한을 완전히 막지는 않습니다.
      - 실제 서비스에서는 반드시 규칙을 보안적으로 설정하세요.
      - 예: read/write를 무조건 허용하면 누구나 데이터를 조작할 수 있습니다.

      - 데모로 빠르게 테스트하려면(비권장, 테스트 전용):
        Realtime Database -> Rules 에서 아래처럼 임시 허용 후,
        동작 확인 후에는 반드시 보안 규칙으로 바꿔주세요.
          {
            "rules": {
              ".read": true,
              ".write": true
            }
          }
  -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const ADMIN_PASSWORD = "admin1234";

    const STORAGE_KEYS = {
      votes: "vote_guestbook_votes_v2",
      guestbook: "vote_guestbook_guestbook_v2",
      votedMap: "vote_guestbook_voted_map_v2",
      admin: "vote_guestbook_admin_v2"
    };

    // =========================
    // Firebase Realtime Database
    // =========================
    // 아래 firebaseConfig에 Firebase 프로젝트 설정값을 넣어주세요.
    // (Firebase Console -> Project settings -> Firebase SDK snippet 복사)
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      databaseURL: "YOUR_DATABASE_URL",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    let firebaseMode = false; // true면 votes/guestbook을 Firebase에서 읽고 씁니다.
    let db = null; // firebase.database()
    let votesState = null; // Firebase에서 내려온 votes (배열)
    let guestbookState = null; // Firebase에서 내려온 guestbook (배열)
    let didSeedDefaultVotes = false; // 기본 후보 3개 자동 생성 1회만

    function firebaseConfigReady(cfg) {
      return (
        cfg &&
        typeof cfg.apiKey === "string" &&
        cfg.apiKey.length > 0 &&
        !cfg.apiKey.startsWith("YOUR_")
      );
    }

    function initFirebaseRealtime() {
      try {
        if (!firebaseConfigReady(firebaseConfig)) {
          console.warn(
            "[Firebase] firebaseConfig가 아직 설정되지 않았습니다. localStorage 모드로 동작합니다."
          );
          return;
        }

        // Firebase 초기화 (compat 사용)
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        firebaseMode = true;

        // ---- votes: /votes/{voteId} = { title, count, createdAt } ----
        const votesRef = db.ref("votes");
        votesRef.on("value", (snapshot) => {
          const data = snapshot.val();
          const entries = data && typeof data === "object" ? Object.entries(data) : [];

          if (entries.length === 0) {
            votesState = [];

            // 기본 후보 3개 자동 시딩 (한 번만)
            if (!didSeedDefaultVotes) {
              didSeedDefaultVotes = true;
              const seed = {};
              defaultVotes.forEach((v) => {
                seed[v.id] = { title: v.title, count: 0, createdAt: v.createdAt };
              });
              votesRef.set(seed);
            }
            renderVotes();
            return;
          }

          votesState = entries
            .map(([id, v]) => {
              const obj = v || {};
              return {
                id,
                title: typeof obj.title === "string" ? obj.title : "",
                count: Number(obj.count || 0),
                createdAt: Number(obj.createdAt || 0)
              };
            })
            .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

          renderVotes();
        });

        // ---- guestbook: /guestbook/{entryId} = { name, message, createdAt } ----
        const guestbookRef = db.ref("guestbook");
        guestbookRef.on("value", (snapshot) => {
          const data = snapshot.val();
          const entries = data && typeof data === "object" ? Object.entries(data) : [];

          if (entries.length === 0) {
            guestbookState = [];
            renderGuestbook();
            return;
          }

          guestbookState = entries
            .map(([id, v]) => {
              const obj = v || {};
              return {
                id,
                name: typeof obj.name === "string" ? obj.name : "익명",
                message: typeof obj.message === "string" ? obj.message : "",
                createdAt: typeof obj.createdAt === "string" ? obj.createdAt : ""
              };
            })
            .sort((a, b) => new Date(b.createdAt).getTime() - new Date(a.createdAt).getTime());

          renderGuestbook();
        });
      } catch (e) {
        console.error("[Firebase] 초기화 실패:", e);
        alert("Firebase 연결에 실패했습니다. 콘솔을 확인해 주세요. localStorage 모드로 계속 동작합니다.");
        firebaseMode = false;
        db = null;
      }
    }

    function uid() {
      if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
      return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
    }

    const defaultVotes = [
      // Firebase 시딩 시 id가 매번 달라지면(랜덤) 중복 후보가 생길 수 있어 고정 id 사용
      { id: "candidate_1", title: "후보 1", count: 0, createdAt: 1 },
      { id: "candidate_2", title: "후보 2", count: 0, createdAt: 2 },
      { id: "candidate_3", title: "후보 3", count: 0, createdAt: 3 }
    ];

    const voteList = document.getElementById("voteList");
    const guestbookList = document.getElementById("guestbookList");
    const guestName = document.getElementById("guestName");
    const guestMessage = document.getElementById("guestMessage");
    const submitGuestbookBtn = document.getElementById("submitGuestbookBtn");
    const newVoteTitle = document.getElementById("newVoteTitle");
    const addVoteBtn = document.getElementById("addVoteBtn");
    const resetVotesBtn = document.getElementById("resetVotesBtn");
    const clearGuestbookBtn = document.getElementById("clearGuestbookBtn");
    const voteAdminPanel = document.getElementById("voteAdminPanel");
    const guestbookAdminActions = document.getElementById("guestbookAdminActions");
    const adminModal = document.getElementById("adminModal");
    const openAdminBtn = document.getElementById("openAdminBtn");
    const closeAdminModalBtn = document.getElementById("closeAdminModalBtn");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminPasswordInput = document.getElementById("adminPasswordInput");
    const adminError = document.getElementById("adminError");
    const adminStatus = document.getElementById("adminStatus");
    const logoutAdminBtn = document.getElementById("logoutAdminBtn");

    function readJSON(key, fallback) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : fallback;
      } catch (e) {
        return fallback;
      }
    }

    function writeJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function getVotes() {
      if (firebaseMode) {
        return Array.isArray(votesState) ? votesState : [];
      }
      const saved = readJSON(STORAGE_KEYS.votes, null);
      if (!saved || !Array.isArray(saved) || saved.length === 0) {
        writeJSON(STORAGE_KEYS.votes, defaultVotes);
        return defaultVotes;
      }
      return saved;
    }

    function getGuestbook() {
      if (firebaseMode) {
        return Array.isArray(guestbookState) ? guestbookState : [];
      }
      return readJSON(STORAGE_KEYS.guestbook, []);
    }

    function getVotedMap() {
      return readJSON(STORAGE_KEYS.votedMap, {});
    }

    function isAdmin() {
      return readJSON(STORAGE_KEYS.admin, false) === true;
    }

    function setAdmin(flag) {
      writeJSON(STORAGE_KEYS.admin, !!flag);
    }

    function escapeHTML(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return "";
      return date.toLocaleString("ko-KR", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function renderAdminUI() {
      const admin = isAdmin();
      adminStatus.textContent = admin ? "관리자 수정 모드" : "일반 방문자 모드";
      adminStatus.className = admin ? "badge admin" : "badge";
      voteAdminPanel.classList.toggle("active", admin);
      guestbookAdminActions.style.display = admin ? "flex" : "none";
      openAdminBtn.style.display = admin ? "none" : "inline-flex";
      logoutAdminBtn.style.display = admin ? "inline-flex" : "none";
    }

    function renderVotes() {
      const votes = getVotes();
      const total = votes.reduce((sum, item) => sum + item.count, 0);
      const votedMap = getVotedMap();
      const alreadyVoted = Object.keys(votedMap).length > 0;

      if (!votes.length) {
        voteList.innerHTML = '<div class="empty">등록된 투표 항목이 없습니다.</div>';
        return;
      }

      voteList.innerHTML = votes.map((item) => {
        const percent = total === 0 ? 0 : Math.round((item.count / total) * 100);
        const isThisVoted = !!votedMap[item.id];
        const voteDisabled = alreadyVoted && !isAdmin();

        return `
          <div class="vote-item">
            <div class="vote-top">
              <div class="vote-title">${escapeHTML(item.title)}</div>
              <div class="vote-count">${item.count}표</div>
            </div>
            <div class="progress-track">
              <div class="progress-bar" style="width:${percent}%"></div>
            </div>
            <div class="vote-bottom">
              <span class="vote-count">${percent}%</span>
              <div class="inline-actions" style="margin-top:0;">
                <button class="mini-btn vote-btn" type="button" data-id="${item.id}" ${voteDisabled ? "disabled" : ""}>
                  ${isThisVoted ? "투표 완료" : "투표하기"}
                </button>
                ${isAdmin() ? `<button class="mini-btn edit-vote-btn" type="button" data-id="${item.id}">이름 수정</button>` : ""}
                ${isAdmin() ? `<button class="mini-btn danger-text delete-vote-btn" type="button" data-id="${item.id}">삭제</button>` : ""}
              </div>
            </div>
          </div>
        `;
      }).join("");

      document.querySelectorAll(".vote-btn").forEach((btn) => {
        btn.addEventListener("click", function () {
          vote(this.dataset.id);
        });
      });

      if (isAdmin()) {
        document.querySelectorAll(".edit-vote-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            editVote(this.dataset.id);
          });
        });

        document.querySelectorAll(".delete-vote-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            deleteVote(this.dataset.id);
          });
        });
      }
    }

    function renderGuestbook() {
      const guestbook = getGuestbook();

      if (!guestbook.length) {
        guestbookList.innerHTML = '<div class="empty">아직 방명록이 없습니다. 첫 메시지를 남겨보세요.</div>';
        return;
      }

      guestbookList.innerHTML = guestbook.map((item) => `
        <div class="guestbook-item">
          <div class="guestbook-meta">
            <span class="guestbook-name">${escapeHTML(item.name)}</span>
            <span class="guestbook-date">${formatDate(item.createdAt)}</span>
          </div>
          <p class="guestbook-message">${escapeHTML(item.message)}</p>
          ${isAdmin() ? `
            <div class="inline-actions">
              <button class="mini-btn danger-text delete-guestbook-btn" type="button" data-id="${item.id}">삭제</button>
            </div>
          ` : ""}
        </div>
      `).join("");

      if (isAdmin()) {
        document.querySelectorAll(".delete-guestbook-btn").forEach((btn) => {
          btn.addEventListener("click", function () {
            deleteGuestbookItem(this.dataset.id);
          });
        });
      }
    }

    function vote(id) {
      const votedMap = getVotedMap();
      const alreadyVoted = Object.keys(votedMap).length > 0;

      if (alreadyVoted && !isAdmin()) {
        alert("이미 이 브라우저에서 투표했습니다.");
        return;
      }

      // Firebase 모드: count만 트랜잭션으로 증가(동시성 안전)
      if (firebaseMode) {
        const voteCountRef = db.ref(`votes/${id}/count`);
        voteCountRef.transaction(
          (current) => (Number(current || 0) + 1),
          function (error, committed) {
            if (error) {
              console.error(error);
              alert("투표에 실패했습니다. 콘솔을 확인해 주세요.");
              return;
            }

            if (committed && !isAdmin()) {
              votedMap[id] = true;
              writeJSON(STORAGE_KEYS.votedMap, votedMap);
            }

            // onValue에서 자동으로 재렌더되지만, 즉시 반영을 위해 한 번 더 호출
            renderVotes();
          }
        );
        return;
      }

      // localStorage 모드(대체)
      const votes = getVotes().map((item) => {
        if (item.id === id) {
          return { ...item, count: item.count + 1 };
        }
        return item;
      });

      writeJSON(STORAGE_KEYS.votes, votes);

      if (!isAdmin()) {
        votedMap[id] = true;
        writeJSON(STORAGE_KEYS.votedMap, votedMap);
      }

      renderVotes();
    }

    function addVote() {
      const title = newVoteTitle.value.trim();
      if (!title) {
        alert("투표 항목 이름을 입력해주세요.");
        return;
      }

      // Firebase 모드
      if (firebaseMode) {
        const id = uid();
        db.ref(`votes/${id}`).set({
          title: title,
          count: 0,
          createdAt: Date.now()
        });
        newVoteTitle.value = "";
        return;
      }

      // localStorage 모드(대체)
      const votes = getVotes();
      votes.push({ id: uid(), title: title, count: 0 });
      writeJSON(STORAGE_KEYS.votes, votes);
      newVoteTitle.value = "";
      renderVotes();
    }

    function editVote(id) {
      const votes = getVotes();
      const target = votes.find((item) => item.id === id);
      if (!target) return;

      const nextTitle = prompt("새 투표 항목 이름", target.title);
      if (nextTitle === null) return;

      const trimmed = nextTitle.trim();
      if (!trimmed) {
        alert("항목 이름은 비워둘 수 없습니다.");
        return;
      }

      // Firebase 모드
      if (firebaseMode) {
        db.ref(`votes/${id}/title`).set(trimmed);
        return;
      }

      // localStorage 모드(대체)
      target.title = trimmed;
      writeJSON(STORAGE_KEYS.votes, votes);
      renderVotes();
    }

    function deleteVote(id) {
      if (!confirm("이 투표 항목을 삭제할까요?")) return;

      // Firebase 모드
      if (firebaseMode) {
        db.ref(`votes/${id}`).remove();
        return;
      }

      // localStorage 모드(대체)
      const votes = getVotes().filter((item) => item.id !== id);
      writeJSON(STORAGE_KEYS.votes, votes);
      renderVotes();
    }

    function resetVotes() {
      if (!confirm("전체 투표 수를 초기화할까요?")) return;

      // Firebase 모드
      if (firebaseMode) {
        const currentVotes = getVotes();
        if (!currentVotes.length) {
          alert("데이터를 불러오는 중이거나 투표 항목이 없습니다.");
          return;
        }

        // /votes/{id}/count 를 0으로
        const updates = {};
        currentVotes.forEach((v) => {
          updates[`${v.id}/count`] = 0;
        });
        db.ref("votes").update(updates);
        writeJSON(STORAGE_KEYS.votedMap, {});
        return;
      }

      // localStorage 모드(대체)
      const reset = getVotes().map((item) => ({ ...item, count: 0 }));
      writeJSON(STORAGE_KEYS.votes, reset);
      writeJSON(STORAGE_KEYS.votedMap, {});
      renderVotes();
    }

    function submitGuestbook() {
      const name = guestName.value.trim() || "익명";
      const message = guestMessage.value.trim();

      if (!message) {
        alert("방명록 내용을 입력해주세요.");
        return;
      }

      // Firebase 모드
      if (firebaseMode) {
        const payload = {
          name: name.slice(0, 20),
          message: message.slice(0, 500),
          createdAt: new Date().toISOString()
        };
        db.ref("guestbook").push(payload);
        guestName.value = "";
        guestMessage.value = "";
        alert("전송되었습니다.");
        return;
      }

      // localStorage 모드(대체)
      const guestbook = getGuestbook();
      guestbook.unshift({
        id: uid(),
        name: name.slice(0, 20),
        message: message.slice(0, 500),
        createdAt: new Date().toISOString()
      });

      writeJSON(STORAGE_KEYS.guestbook, guestbook);
      guestName.value = "";
      guestMessage.value = "";
      renderGuestbook();
      alert("방명록이 저장되었습니다.");
    }

    function deleteGuestbookItem(id) {
      if (!confirm("이 방명록을 삭제할까요?")) return;

      // Firebase 모드
      if (firebaseMode) {
        db.ref(`guestbook/${id}`).remove();
        return;
      }

      // localStorage 모드(대체)
      const next = getGuestbook().filter((item) => item.id !== id);
      writeJSON(STORAGE_KEYS.guestbook, next);
      renderGuestbook();
    }

    function clearGuestbook() {
      if (!confirm("방명록 전체를 삭제할까요?")) return;

      // Firebase 모드
      if (firebaseMode) {
        db.ref("guestbook").remove();
        return;
      }

      // localStorage 모드(대체)
      writeJSON(STORAGE_KEYS.guestbook, []);
      renderGuestbook();
    }

    function openAdminModal() {
      adminModal.classList.add("active");
      adminPasswordInput.value = "";
      adminError.textContent = "";
      setTimeout(() => adminPasswordInput.focus(), 10);
    }

    function closeAdminModal() {
      adminModal.classList.remove("active");
    }

    function adminLogin() {
      const input = adminPasswordInput.value;
      if (input !== ADMIN_PASSWORD) {
        adminError.textContent = "비밀번호가 다릅니다.";
        return;
      }

      setAdmin(true);
      closeAdminModal();
      renderAll();
    }

    function adminLogout() {
      setAdmin(false);
      renderAll();
    }

    function renderAll() {
      renderAdminUI();
      renderVotes();
      renderGuestbook();
    }

    openAdminBtn.addEventListener("click", openAdminModal);
    closeAdminModalBtn.addEventListener("click", closeAdminModal);
    adminLoginBtn.addEventListener("click", adminLogin);
    logoutAdminBtn.addEventListener("click", adminLogout);
    addVoteBtn.addEventListener("click", addVote);
    resetVotesBtn.addEventListener("click", resetVotes);
    submitGuestbookBtn.addEventListener("click", submitGuestbook);
    clearGuestbookBtn.addEventListener("click", clearGuestbook);

    adminPasswordInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter") adminLogin();
    });

    adminModal.addEventListener("click", function(e) {
      if (e.target === adminModal) closeAdminModal();
    });

    // Firebase 연결 시도(설정값이 없으면 localStorage 모드로 유지)
    initFirebaseRealtime();
    renderAll();
  </script>
</body>
</html>
